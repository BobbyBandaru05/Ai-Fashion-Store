<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0d1117;
            color:white;
        }

        .order-card{
            background:#161b22;
            border-radius:20px;
            padding:20px;
            margin-bottom:20px;
            display:flex;
            gap:20px;
            align-items:center;
        }

        .order-img{
            width:120px;
            height:120px;
            object-fit:contain;
            background:white;
            border-radius:10px;
        }

        .price{
            color:#00ff99;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">My Orders</h2>

    {% if orders %}

        {% for order in orders %}

        <div class="order-card">

            <!-- Product Image -->
            <img src="{{ order.product.image.url }}" class="order-img">

            <div>

                <!-- Product Name -->
                <h4>{{ order.product.name }}</h4>

                <!-- Price -->
                <p class="price">₹{{ order.total_price }}</p>

                <!-- Quantity -->
                <p>Quantity: {{ order.quantity }}</p>

                <!-- Status -->
                <p>Status: {{ order.status }}</p>

                <!-- Date -->
                <small>Ordered on: {{ order.created_at }}</small>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <h4>No orders yet</h4>

    {% endif %}

</div>

</body>
</html>
