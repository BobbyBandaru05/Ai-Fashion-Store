<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0d1117;color:white;">

<!-- Navbar -->
<nav class="navbar navbar-dark"
style="
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            AI Fashion Store
        </a>

    </div>

</nav>

<!-- Checkout Form -->
<div class="container mt-5">

    <div class="card p-4"
    style="
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:none;
    border-radius:20px;
    box-shadow:0 0 20px rgba(131,56,236,0.4);
    color:white;
    ">

        <h2 class="text-center mb-4">
            Checkout Form
        </h2>

        <form action="/success/" method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="mb-2">
                    Full Name
                </label>

                <input
                    type="text"
                    name="fullname"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="mb-2">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="mb-2">
                    Phone Number
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="mb-2">
                    Address
                </label>

                <textarea
                    name="address"
                    class="form-control"
                    rows="4"
                    required></textarea>

            </div>

            <button
                type="submit"
                class="btn w-100"
                style="
                background:linear-gradient(
                90deg,
                #ff006e,
                #8338ec);
                color:white;
                border:none;">
                Place Order
            </button>

        </form>

    </div>

</div>

<!-- Footer -->
<footer
class="text-center p-4 mt-5"
style="
background:#161b22;
color:white;">

    <h4>AI Fashion Store</h4>

    <p>Fashion • Style • Innovation</p>

    <p>© 2026 All Rights Reserved</p>

</footer>

</body>
</html>
```
