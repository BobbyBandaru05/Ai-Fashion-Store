<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Fashion Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0d1117;color:white;">

<!-- Navbar -->
<nav class="navbar navbar-dark"
style="
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
">

    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            AI Fashion Store
        </a>
    </div>

</nav>

<!-- Login Form -->
<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card mt-5 p-4"
            style="
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
            border:none;
            border-radius:20px;
            color:white;
            box-shadow:0 0 20px rgba(131,56,236,0.4);
            ">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <!-- ✅ FIXED FORM -->
                <form method="POST" action="/login/">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter username"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn w-100"
                        style="
                        background:linear-gradient(90deg,#ff006e,#8338ec);
                        color:white;
                        border:none;">
                        Login
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Don't have an account?
                    <a href="/register/" style="color:#ff006e;">
                        Register
                    </a>
                </p>

                <!-- Optional Django messages -->
                {% if messages %}
                    {% for message in messages %}
                        <p class="text-center text-danger">
                            {{ message }}
                        </p>
                    {% endfor %}
                {% endif %}

            </div>

        </div>

    </div>

</div>

</body>
</html>
