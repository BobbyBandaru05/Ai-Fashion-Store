<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#020817;
            color:white;
        }

        .glass-card{
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            box-shadow:0 0 30px rgba(131,56,236,0.2);
        }

        .product-img{
            width:90px;
            height:90px;
            object-fit:cover;
            border-radius:10px;
        }

        .cart-row{
            background:rgba(255,255,255,0.03);
            border-radius:15px;
            margin-bottom:15px;
            padding:15px;
        }

        .btn-gradient{
            background:linear-gradient(
            90deg,
            #ff006e,
            #8338ec);
            color:white;
            border:none;
        }

        .btn-gradient:hover{
            color:white;
            opacity:0.9;
        }

        .price{
            color:#00ff99;
            font-weight:bold;
            font-size:20px;
        }

        .navbar{
            background:#161b22;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            AI Fashion Store
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Shopping Cart
    </h1>

    <div class="glass-card p-4">

        {% if products %}

            {% for product in products %}

            <div class="cart-row">

                <div class="row align-items-center">

                    <div class="col-md-2 text-center">
                        <img src="{{ product.image.url }}"
                             class="product-img">
                    </div>

                    <div class="col-md-4">
                        <h4>{{ product.name }}</h4>
                    </div>

                    <div class="col-md-3">
                        <span class="price">
                            ₹{{ product.price }}
                        </span>
                    </div>

                    <div class="col-md-3">

                        <a href="/remove-from-cart/{{ product.id }}/"
                           class="btn btn-danger">
                            Remove
                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

            <div class="text-end mt-4">

                <a href="/checkout/"
                   class="btn btn-gradient btn-lg">
                    Proceed To Checkout
                </a>

            </div>

        {% else %}

            <h3 class="text-center">
                Your Cart Is Empty
            </h3>

        {% endif %}

    </div>

</div>

<footer
class="text-center p-4 mt-5"
style="
background:#161b22;
color:white;">

    <h4>AI Fashion Store</h4>

    <p>Fashion • Style • Innovation</p>

    <p>© 2026 All Rights Reserved</p>

</footer>

</body>
</html>
